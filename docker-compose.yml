services:
  db:
    image: postgres:16-alpine
    container_name: saas-postgres-db
    restart: always
    environment:
      POSTGRES_USER: alexandre
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: saas_business_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: